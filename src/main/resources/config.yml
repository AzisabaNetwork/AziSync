# default config.yml for AziSync

# config version
version: 1.0

# storage type (SQL or HYBRID)
# SQL: MySQL/MariaDB only
# HYBRID: MySQL/MariaDB is persistent storage; Redis is used for fast temporary coordination/cache
storage:
  type: SQL

# redis connection
redis:
  host: localhost
  port: 6379
  username: ""
  password: ""
  timeout: 2000

# database connection
database:
  host: localhost
  port: 3306
  database: "azisync"
  username: "azisync"
  password: "azisync"
  useSSL: false
  databaseName: "azisync"
  TablesNames:
    inventoryTableName: "azisync_inventory"
    enderChestTableName: "azisync_enderchest"
    experienceTableName: "azisync_experience"
    potionEffectsTableName: "azisync_potioneffects"
    advancementTableName: "azisync_advancement"
    healthFoodAirTableName: "azisync_healthfoodair"
    locationTableName: "azisync_location"
    economyTableName: "azisync_economy"
    craftGuiTableName: "azisync_craftgui"
    syncStateTableName: "azisync_sync_state"


general:
  enableModules:
    shareInventory: false
    shareGameMode: false
    shareArmor: false
    shareEnderChest: false
    shareExperience: false
    sharePotionEffects: false
    shareAdvancement: false
    shareHealth: false
    shareFood: false
    shareAir: false
    shareLocation: false
    shareBedSpawn: false
    shareEconomy: false
    shareCraftGui: false
  economyOptions:
    ChestShop-Support: false
    ShopChest-Support: false
    AuctionHouse-Support: false
    CrazyAuctions-Support: false
    EssentialsEconomyCommands-Support: false
  saveDataTask:
    enabled: false
    interval: 300 # in seconds
    hideLogMessage: false
  disableSounds: false
  disableCreativeItemShare: false
  kickOnFailedSync: false
  # Delay loading synced data after join so other join handlers can finish first.
  loadDelayTicks: 5
  locationSyncOptions:
    onlineTimeToSaveLocation: 0

debugMessage:
  EconomySync: false
  InventorySync: false
  HealthSync: false
